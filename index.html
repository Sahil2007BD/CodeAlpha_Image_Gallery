<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="filter-bar glass">
  <button onclick="filterImages('all')" class="filter active">All</button>
  <button onclick="filterImages('nature')" class="filter">🌿 Nature</button>
  <button onclick="filterImages('city')" class="filter">🏙 City</button>
  <button onclick="filterImages('people')" class="filter">👤 People</button>
</div>
<header class="topbar">
  <h2>📸 Gallery</h2>

  <div class="controls">
    <button class="theme-btn" onclick="toggleDarkMode()">🌙</button>
  </div>
</header>

<!-- UPLOAD -->
<div class="upload-box" id="dropZone">
  Drag & Drop or Click to Upload
  <input type="file" id="upload" hidden>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<!-- 🔥 CATEGORY POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-card">

    <h3>Select Category</h3>

    <div class="popup-options">
      <button class="cat-btn" onclick="setCategory('nature', event)">🌿 Nature</button>
<button class="cat-btn" onclick="setCategory('city', event)">🏙 City</button>
<button class="cat-btn" onclick="setCategory('people', event)">👤 People</button>
    </div>

    <button class="confirm" onclick="confirmUpload()">Upload Image</button>

  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
