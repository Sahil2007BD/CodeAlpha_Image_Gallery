<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Image Gallery</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- HEADER -->
<header class="glass">
  <h1>Smart Image Gallery</h1>

  <div class="controls">
    <button onclick="toggleDarkMode()">🌙 Theme</button>
  </div>

  <div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('people')">People</button>
  </div>
</header>

<!-- UPLOAD ZONE -->
<div class="drop-zone glass" id="dropZone">
  <p>Drag & Drop Images Here or Click to Upload</p>
  <input type="file" id="upload" accept="image/*" hidden>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>

  <img id="lightbox-img">

  <div class="nav">
    <button onclick="prevImage()">Prev</button>
    <button onclick="nextImage()">Next</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
